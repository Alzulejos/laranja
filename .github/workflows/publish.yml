name: ci

on:
  push:
    branches: [main, prod, feat/*, fix/*, chore/*]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

  publish:
    # Only ship from prod, and only after verify passes.
    needs: verify
    if: github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # OIDC: lets npm verify this workflow's identity (trusted publishing) — no token
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: "@alzulejos"

      # Trusted publishing requires npm >= 11.5.1; node 22 ships an older npm.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build all packages (clean — avoid stale tsc -b incremental emit)
        run: |
          rm -rf packages/*/dist packages/*/*.tsbuildinfo
          npm run build

      - name: Rewrite entry points to dist (CI-only)
        run: node scripts/prepare-publish.mjs

      - name: Publish to npm (OIDC trusted publishing — no token)
        run: |
          set -euo pipefail
          # dependency order: dependents published after their deps
          for dir in core runtime scanner decorators cdk docs cli; do
            pkg="packages/$dir"
            name=$(node -p "require('./$pkg/package.json').name")
            version=$(node -p "require('./$pkg/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip $name@$version (already published)"
            else
              echo "publish $name@$version"
              npm publish --workspace "$pkg"
            fi
          done
