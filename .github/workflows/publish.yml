name: ci

on:
  push:
    branches: [main, prod, feat/*, fix/*, chore/*]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test
